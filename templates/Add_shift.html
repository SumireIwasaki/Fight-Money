<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="{{ url_for('static', filename='Add_shift.css') }}?v=20260717">
<title>シフト追加</title>
</head>

<body>

<div class="container">

    <h1>シフト追加</h1>
    <form action="/save_shift" method="POST" id="shift-form">
	<input type="hidden" name="help_id" id="help_id">
	<input type="hidden" name="done_date" value="{{ selected_date }}">
   
    {% for help in help_list %}

    <div class="help-card" data-id="{{ help['id'] }}">

        <div class="left">

            <span class="dot" style="background:{{ help['color'] }};">
            </span>

            <div>

                <div class="title">
                    {{ help["title"] }}
                </div>

                <div class="reward">
                    ¥{{ help["reward"] }}
                </div>

            </div>

        </div>

    </div>   <!-- ← help-card を閉じる -->

    {% endfor %}
    <button class="save_btn" type="submit">保存</button>
     
    </form>


</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const cards = document.querySelectorAll(".help-card");
    const helpId = document.getElementById("help_id");
    const form = document.getElementById("shift-form");

    form.addEventListener("submit", function (e) {
        if (helpId.value === "") {
            e.preventDefault();
            alert("お手伝いを選択してください");
        }
    });

    cards.forEach(card => {
        card.addEventListener("click", function () {

            cards.forEach(c => {
                c.classList.remove("selected");
            });

            this.classList.add("selected");
            helpId.value = this.dataset.id;
        });
    });

});

</script>

</body>
</html>
